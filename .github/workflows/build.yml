name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build arm64
      run: make build-arm64

    - name: Verify build
      run: |
        test -f build-arm64/XXS-Audio-Player.app/Contents/MacOS/XXS-Audio-Player
        file build-arm64/XXS-Audio-Player.app/Contents/MacOS/XXS-Audio-Player

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXS-Audio-Player-arm64-${{ github.sha }}
        path: build-arm64/XXS-Audio-Player.app
        retention-days: 30

  build-x86_64:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build x86_64
      run: make build-x86_64

    - name: Verify build
      run: |
        test -f build-x86_64/XXS-Audio-Player.app/Contents/MacOS/XXS-Audio-Player
        file build-x86_64/XXS-Audio-Player.app/Contents/MacOS/XXS-Audio-Player

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXS-Audio-Player-x86_64-${{ github.sha }}
        path: build-x86_64/XXS-Audio-Player.app
        retention-days: 30
